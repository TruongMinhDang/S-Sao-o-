runtime: nodejs20
build:
  - npm install
  - npm run build --workspace=apps/web
  # --- FIX LỖI COPY CHO MONOREPO ---
  - mkdir -p apps/web/.next/standalone/apps/web/public
  - mkdir -p apps/web/.next/standalone/apps/web/.next/static
  - cp -R apps/web/public/* apps/web/.next/standalone/apps/web/public/ || true
  - cp -R apps/web/.next/static/* apps/web/.next/standalone/apps/web/.next/static/ || true

# --- ENTRYPOINT TRỎ THẲNG VÀO STANDALONE ---
entrypoint: sh -c "PORT=8080 HOSTNAME=0.0.0.0 node apps/web/.next/standalone/apps/web/server.js"

env:
  - variable: HOSTNAME
    value: "0.0.0.0"
  - variable: PORT
    value: "8080"
  - variable: APP_SOSAODO_ID
    secret: firebase-project-id
  - variable: APP_SOSAODO_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: APP_SOSAODO_KEY
    secret: FIREBASE_PRIVATE_KEY

runConfig:
  cpu: 1
  memoryMiB: 1024